<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.wrapper{
  position:relative;
  width:180px;
  text-align:center;
}

.picker{
  height:120px; /* 3 items (40px each) */
  overflow-y:auto;
  scroll-snap-type:y mandatory;
}

.item{
  display:block;
  height:40px;
  line-height:40px;
  scroll-snap-align:center;
  font-size:18px;
  text-decoration:none;
  color:black;
}

.item:hover{
  background:#eee;
}

.spacer{
  height:40px; /* half of visible area */
}

.highlight{
  position:absolute;
  top:80px; /* ✅ middle item */
  height:40px;
  width:100%;
  border-top:2px solid black;
  border-bottom:2px solid black;
  pointer-events:none;
}

/* arrows */
.arrow{
  cursor:pointer;
  user-select:none;
  font-size:20px;
  padding:5px;
}

</style>

</head>
<body>

<div class="wrapper">

<div class="arrow" id="up">▲</div>

<div class="highlight"></div>

<div class="picker" id="picker">
  <div class="spacer"></div>
</div>

<div class="arrow" id="down">▼</div>

</div>

<script>

const routes = {
  "Tutorial": "/tutorial",
  "Start Game": "/play",
  "Marketplace": "/marketplac3",
  "Settings": "/settings",
  "Credits": "/credits",
  "Leaderboard": "/leaderboard",
  "About": "/about"
}

const values = Object.keys(routes)
const picker = document.getElementById("picker")

function buildWheel(){
  for (let r = 0; r < 5; r++) {
    values.forEach(v => {
      const link = document.createElement("a")
      link.className = "item"
      link.innerText = v
      link.href = routes[v]
      picker.appendChild(link)
    })
  }

  const spacer = document.createElement("div")
  spacer.className="spacer"
  picker.appendChild(spacer)
}

buildWheel()

const itemHeight = 40
const setSize = values.length * itemHeight

picker.scrollTop = setSize * 2

// infinite scroll
picker.addEventListener("scroll", ()=>{
  if(picker.scrollTop < setSize){
    picker.scrollTop += setSize
  }
  if(picker.scrollTop > setSize * 3){
    picker.scrollTop -= setSize
  }
})

// arrow controls
document.getElementById("up").onclick = () => {
  picker.scrollBy({ top: -itemHeight, behavior: "smooth" })
}

document.getElementById("down").onclick = () => {
  picker.scrollBy({ top: itemHeight, behavior: "smooth" })
}

</script>

</body>
</html>
