<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.wrapper{
  position:relative;
  width:160px;
}

.picker{
  height:200px;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  text-align:center;
}

/* FIX: make links behave like blocks */
.item{
  display:block;
  height:40px;
  line-height:40px;
  scroll-snap-align:center;
  font-size:20px;
  text-decoration:none;
  color:black;
}

.item:hover{
  background:#eee;
}

.spacer{
  height:80px;
}

.highlight{
  position:absolute;
  top:80px;
  height:40px;
  width:100%;
  border-top:2px solid black;
  border-bottom:2px solid black;
  pointer-events:none;
}

</style>

</head>
<body>

<div class="wrapper">

<div class="highlight"></div>

<div class="picker" id="picker">
<div class="spacer"></div>
</div>

</div>

<script>

const routes = {
  "Tutorial": "/tutorial",
  "Start Game": "/play",
  "Marketplace": "/shop",
  "Settings": "/settings",
  "Credits": "/credits",
  "Leaderboard": "/leaderboard",
  "About": "/about"
}

const values = Object.keys(routes)
const picker = document.getElementById("picker")

function buildWheel(){

  for (let r = 0; r < 5; r++) {
    values.forEach(v => {
      const link = document.createElement("a")
      link.className = "item"
      link.innerText = v
      link.href = routes[v]

      // OPTIONAL: prevent accidental clicks while scrolling
      link.addEventListener("click", (e) => {
        if (isScrolling) e.preventDefault()
      })

      picker.appendChild(link)
    })
  }

  const spacer = document.createElement("div")
  spacer.className="spacer"
  picker.appendChild(spacer)

}

buildWheel()

const itemHeight = 40
const setSize = values.length * itemHeight

picker.scrollTop = setSize * 2   // start in middle

let isScrolling = false
let scrollTimeout

picker.addEventListener("scroll", ()=>{

  isScrolling = true
  clearTimeout(scrollTimeout)

  scrollTimeout = setTimeout(()=>{
    isScrolling = false
  }, 100)

  // infinite loop effect
  if(picker.scrollTop < setSize){
    picker.scrollTop += setSize
  }

  if(picker.scrollTop > setSize * 3){
    picker.scrollTop -= setSize
  }

})

</script>

</body>
</html>
